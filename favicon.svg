<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <defs>
    <linearGradient id="frontGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> 
      <stop offset="100%" stop-color="#1e40af" /> 
    </linearGradient>
    
    <linearGradient id="sideGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <style>
    .text-3d {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 100px;
      font-weight: bold;
      letter-spacing: -2px;
    }
  </style>

  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(10, 10)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(9, 9)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(8, 8)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(7, 7)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(6, 6)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(5, 5)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(4, 4)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(3, 3)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(2, 2)">3D</text>
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#sideGradient)" transform="translate(1, 1)">3D</text>

  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="url(#frontGradient)">3D</text>
  
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="text-3d" fill="none" stroke="#60a5fa" stroke-width="2">3D</text>
</svg>
